name: CI / CD

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - constraints.txt
      - docker-compose.yml

jobs:
  # ── Build & push ───────────────────────────────────────────────────────────
  # Always runs, but build steps are skipped if image files didn't change.
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest  # fresh Ubuntu machine provided by GitHub
    permissions:
      contents: read    # read the repo code
      packages: write   # push image to GHCR
    steps:
      # Clone the repo onto the runner.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # fetch last 2 commits so we can diff HEAD~1 vs HEAD below

      # Compare the last two commits to check if any image-related file changed.
      # Result saved as steps.check.outputs.needed = true/false
      # and used by every step below to decide whether to run.
      - name: Check if image rebuild needed
        id: check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD \
            | grep -cE '^(Dockerfile|requirements\.txt|constraints\.txt)$' || true)
          echo "needed=$( [ "$changed" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

      # Authenticate with GHCR so we can push the image.
      # GITHUB_TOKEN is injected automatically by GitHub — no secret to create.
      # github.actor is the GitHub username of whoever triggered the push.
      - uses: docker/login-action@v3
        if: steps.check.outputs.needed == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Install the Buildx builder engine on the runner.
      # Required before building — also enables layer caching in the next step.
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.needed == 'true'

      # Build the Docker image from the Dockerfile and push it to GHCR.
      # cache-from/cache-to reuse layers from previous runs so unchanged
      # layers (apt packages, pip installs) are not rebuilt from scratch.
      - name: Build and push
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .        # build from repo root where Dockerfile lives
          push: true        # push to GHCR after building
          tags: ghcr.io/${{ github.repository_owner }}/keshet-airflow:latest
          cache-from: type=gha        # read cached layers from GitHub cache
          cache-to: type=gha,mode=max # save all layers to cache after build

