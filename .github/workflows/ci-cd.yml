name: CI / CD

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - constraints.txt
      - docker-compose.yml

jobs:
  # ── Build & push ───────────────────────────────────────────────────────────
  # Always runs, but build steps are skipped if image files didn't change.
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if image rebuild needed
        id: check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD \
            | grep -cE '^(Dockerfile|requirements\.txt|constraints\.txt)$' || true)
          echo "needed=$( [ "$changed" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        if: steps.check.outputs.needed == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.needed == 'true'

      - name: Build and push
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/keshet-airflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

