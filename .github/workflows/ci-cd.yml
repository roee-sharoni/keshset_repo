name: CI / CD

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - constraints.txt
      - docker-compose.yml
  workflow_dispatch:

# Queue concurrent runs instead of cancelling — a deploy in-flight should
# never be killed half-way through `docker compose up`.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Classify what changed ──────────────────────────────────────────────────
  # Tells downstream jobs which of {image, compose} were touched.
  # On workflow_dispatch we treat everything as changed so the full pipeline runs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.detect.outputs.image }}
      compose: ${{ steps.detect.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff against

      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image=true"   >> "$GITHUB_OUTPUT"
            echo "compose=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          diff=$(git diff --name-only HEAD~1 HEAD)
          echo "$diff" | grep -qE '^(Dockerfile|requirements\.txt|constraints\.txt)$' \
            && echo "image=true"  >> "$GITHUB_OUTPUT" \
            || echo "image=false" >> "$GITHUB_OUTPUT"
          echo "$diff" | grep -qE '^docker-compose\.yml$' \
            && echo "compose=true"  >> "$GITHUB_OUTPUT" \
            || echo "compose=false" >> "$GITHUB_OUTPUT"

  # ── Build & push image ─────────────────────────────────────────────────────
  # Runs only when Dockerfile/requirements/constraints changed (or manual dispatch).
  # Pushes two tags: :latest and :sha-<short> (for pin/rollback).
  build:
    name: Build & Push Image
    needs: changes
    if: needs.changes.outputs.image == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read   # read the repo code
      packages: write  # push image to GHCR
    steps:
      - uses: actions/checkout@v4

      # GITHUB_TOKEN is auto-injected — no secret to create.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Produces tags + OCI labels (source, revision, created, title).
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/keshset_repo
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VM ───────────────────────────────────────────────────────────
  # Runs on the self-hosted runner inside the VPN (label: airflow-vm).
  # No SSH secrets — runner is already on the VM and GHCR login is done once
  # during VM setup.
  #
  # Fires when:
  #   - build succeeded (new image pushed → VM must pull it), OR
  #   - build was skipped because only compose changed (apply new compose), OR
  #   - manual workflow_dispatch (build runs above; if it succeeds we deploy).
  # Does NOT fire when build failed/cancelled — never deploy a broken image.
  deploy:
    name: Deploy to VM
    needs: [changes, build]
    if: |
      always() &&
      (needs.build.result == 'success' ||
       (needs.build.result == 'skipped' && needs.changes.outputs.compose == 'true'))
    runs-on: [self-hosted, airflow-vm]
    steps:
      - name: Sync compose file (single atomic write)
        run: |
          git -C /opt/airflow fetch origin
          git -C /opt/airflow checkout origin/main -- docker-compose.yml

      - name: Pull image and restart stack
        working-directory: /opt/airflow
        run: |
          docker compose pull
          docker compose up -d --remove-orphans

      - name: Health check
        run: |
          for i in $(seq 1 6); do
            sleep 10
            if curl -sf http://localhost:8080/api/v2/monitor/health; then
              echo "Healthy!"
              exit 0
            fi
            echo "Attempt $i/6..."
          done
          echo "Health check failed"
          exit 1
