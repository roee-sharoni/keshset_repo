x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: ghcr.io/roee-sharoni/keshet-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://airflow:${MYSQL_PASSWORD}@mysql/airflow?charset=utf8mb4
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__API__SECRET_KEY: ${API_SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # Define users as username:role — password is auto-generated on first run
    # and persisted in ./config/simple_auth_manager_passwords.json via volume mount
    # Available roles: admin, op, user, viewer
    AIRFLOW__SIMPLE_AUTH_MANAGER__USERS: "admin:admin"
    AIRFLOW_CONN_SNOWFLAKE_BYS: ${AIRFLOW_CONN_SNOWFLAKE_BYS}
    AIRFLOW_CONN_SNOWFLAKE_UGC: ${AIRFLOW_CONN_SNOWFLAKE_UGC}
    AIRFLOW_CONN_BIGQUERY_PROD: ${AIRFLOW_CONN_BIGQUERY_PROD}
    AIRFLOW_CONN_SLACK_ALERTS: ${AIRFLOW_CONN_SLACK_ALERTS}
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags          # DAGs folder — updated via git pull in CI/CD
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins:ro
    - ./config:/opt/airflow/config
    # Persist generated passwords file so password survives container restarts
    - ./config/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json.generated
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    mysql:
      condition: service_healthy

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --explicit_defaults_for_timestamp=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate
    restart: "no"

  api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  triggerer:
    <<: *airflow-common
    command: triggerer
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  mysql-data:
